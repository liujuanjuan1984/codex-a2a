version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "fastapi"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "httpx"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "protobuf"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "setuptools-scm"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "uvicorn"
        update-types:
          - "version-update:semver-minor"
    groups:
      uv-all-updates:
        patterns:
          - "*"
        exclude-patterns:
          # Keep build-system dependencies out of the grouped uv PR. In practice the
          # grouped updater can lose previous-version metadata for setuptools-scm[toml],
          # which causes the whole grouped change set to be dropped.
          - "setuptools"
          - "setuptools-scm"
          - "setuptools-scm*"
