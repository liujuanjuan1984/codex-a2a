name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish"
        required: true
        type: string
      publish_to_pypi:
        description: "Also publish this tag to PyPI"
        required: false
        default: false
        type: boolean

jobs:
  build_release_artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.artifact_name.outputs.name }}
      release_tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Resolve release tag
        id: release_tag
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Resolve artifact name
        id: artifact_name
        run: echo "name=release-artifacts-${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}

      - name: Build package artifacts
        env:
          PYTHONWARNINGS: >-
            ignore::UserWarning:vcs_versioning._backends._git,
            ignore::UserWarning:vcs_versioning.overrides
        run: uv build --no-sources

      - name: Capture built wheel path
        id: wheel
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib

          wheels = sorted(pathlib.Path("dist").glob("codex_a2a-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel in dist/, found {len(wheels)}")
          print(f"wheel_path={wheels[0]}")
          PY

      - name: Verify published version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib

          wheel = pathlib.Path(os.environ["WHEEL_PATH"]).name
          version = wheel.removeprefix("codex_a2a-").split("-py3", 1)[0]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if version != tag:
              raise SystemExit(f"Wheel version {version!r} does not match tag {tag!r}")
          print(f"Validated release version: {version}")
          PY
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          WHEEL_PATH: ${{ steps.wheel.outputs.wheel_path }}

      - name: Smoke test wheel install
        run: bash ./scripts/smoke_test_built_cli.sh
        env:
          WHEEL_PATH: ${{ steps.wheel.outputs.wheel_path }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: dist/
          if-no-files-found: error

  publish_pypi:
    runs-on: ubuntu-latest
    needs: build_release_artifacts
    if: github.event_name == 'push' || inputs.publish_to_pypi
    permissions:
      id-token: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build_release_artifacts.outputs.artifact_name }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_github_release:
    runs-on: ubuntu-latest
    needs:
      - build_release_artifacts
      - publish_pypi
    if: >-
      always() &&
      needs.build_release_artifacts.result == 'success' &&
      (needs.publish_pypi.result == 'success' || needs.publish_pypi.result == 'skipped')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build_release_artifacts.outputs.artifact_name }}
          path: dist

      - name: Sync GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build_release_artifacts.outputs.release_tag }}
        run: bash ./scripts/publish_github_release.sh
