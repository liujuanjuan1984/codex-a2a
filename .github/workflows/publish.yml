name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Resolve release tag
        id: release_tag
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Build package artifacts
        env:
          PYTHONWARNINGS: >-
            ignore::UserWarning:vcs_versioning._backends._git,
            ignore::UserWarning:vcs_versioning.overrides
        run: uv build --no-sources

      - name: Capture built wheel path
        id: wheel
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib

          wheels = sorted(pathlib.Path("dist").glob("codex_a2a-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel in dist/, found {len(wheels)}")
          print(f"wheel_path={wheels[0]}")
          PY

      - name: Verify published version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib

          wheel = pathlib.Path(os.environ["WHEEL_PATH"]).name
          version = wheel.removeprefix("codex_a2a-").split("-py3", 1)[0]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if version != tag:
              raise SystemExit(f"Wheel version {version!r} does not match tag {tag!r}")
          print(f"Validated release version: {version}")
          PY
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          WHEEL_PATH: ${{ steps.wheel.outputs.wheel_path }}

      - name: Smoke test wheel install
        run: bash ./scripts/smoke_test_built_cli.sh
        env:
          WHEEL_PATH: ${{ steps.wheel.outputs.wheel_path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*.whl --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.tar.gz dist/*.whl --generate-notes --verify-tag
          fi
